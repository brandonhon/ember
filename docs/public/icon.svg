<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Light-mode icon: dark ink bars on cream backgrounds. The previous
       version embedded a `prefers-color-scheme: dark` media rule that
       flipped the bars to cream when the OS was dark — which made the
       icon invisible against the VitePress light-theme hero on a
       dark-OS machine. The site theme owns which file is loaded (via
       index.md `image.light` / `image.dark`); the SVG itself is now
       deterministic. App side uses /icon.svg + /icon-dark.svg the same
       way via App.svelte. -->
  <defs>
    <linearGradient id="emb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8643a"/>
      <stop offset="1" stop-color="#c2451d"/>
    </linearGradient>
  </defs>
  <circle cx="13" cy="15" r="6.5" fill="url(#emb)"/>
  <rect x="25" y="11.5" width="31" height="8" rx="4" fill="#211d18"/>
  <rect x="8"  y="28"   width="48" height="8" rx="4" fill="#211d18"/>
  <rect x="8"  y="44.5" width="34" height="8" rx="4" fill="url(#emb)"/>
</svg>
