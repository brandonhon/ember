name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'web/**'
      - '.github/workflows/pages.yml'
  # Rebuild after a release is published so the demo SPA's About version picks up
  # the new tag (release.yml runs on the tag; this redeploys with that version).
  release:
    types: [published]
  # Manual run from the Actions tab if you change something outside docs/
  # that the site references (e.g., a screenshot in web/public).
  workflow_dispatch:

permissions:
  contents: write   # to push to gh-pages

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0   # need tags so `git describe` can resolve the release version

      # Latest release tag → injected into the demo SPA's About version. On a
      # release event HEAD is the tag; on a main/dispatch run it's the most
      # recent tag reachable, i.e. the current release.
      - name: Resolve release version
        id: ver
        run: echo "version=$(git describe --tags --abbrev=0 2>/dev/null || echo demo)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install
        working-directory: docs
        run: npm install --no-audit --no-fund

      - name: Build site
        working-directory: docs
        run: npm run docs:build

      # Static "demo mode" SPA — frozen, mocked-API build served under
      # /ember/demo/. Built from the committed web/src/demo/demo-data.json;
      # no backend involved. Staged into the VitePress dist so it ships in the
      # same gh-pages deploy.
      - name: Install demo SPA deps
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Build demo SPA
        working-directory: web
        env:
          VITE_DEMO_VERSION: ${{ steps.ver.outputs.version }}
        run: npm run build:demo

      - name: Stage demo into dist
        run: cp -r web/dist docs/.vitepress/dist/demo

      - name: Add .nojekyll
        # Tells GitHub Pages to skip Jekyll processing — VitePress emits
        # _assets/ directories which Jekyll would refuse to serve.
        run: touch docs/.vitepress/dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages
          # Custom domain. peaceiris force-pushes gh-pages every run, so the
          # CNAME must be written here — a CNAME added only via the Pages UI
          # would be wiped on the next deploy.
          cname: ember-rss.com
          commit_message: "deploy: docs from ${{ github.sha }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
