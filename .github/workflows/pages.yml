name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'web/**'
      - '.github/workflows/pages.yml'
  # Manual run from the Actions tab if you change something outside docs/
  # that the site references (e.g., a screenshot in web/public).
  workflow_dispatch:

permissions:
  contents: write   # to push to gh-pages

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Private SSH deploy key for the Tangled mirror, registered to the
      # account that owns the Tangled repo. Empty until the secret is set —
      # the mirror step below is skipped while empty, so Pages stays green.
      TANGLED_DEPLOY_KEY: ${{ secrets.TANGLED_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install
        working-directory: docs
        run: npm install --no-audit --no-fund

      - name: Build site
        working-directory: docs
        run: npm run docs:build

      # Static "demo mode" SPA — frozen, mocked-API build served under
      # /ember/demo/. Built from the committed web/src/demo/demo-data.json;
      # no backend involved. Staged into the VitePress dist so it ships in the
      # same gh-pages deploy.
      - name: Install demo SPA deps
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Build demo SPA
        working-directory: web
        run: npm run build:demo

      - name: Stage demo into dist
        run: cp -r web/dist docs/.vitepress/dist/demo

      - name: Add .nojekyll
        # Tells GitHub Pages to skip Jekyll processing — VitePress emits
        # _assets/ directories which Jekyll would refuse to serve.
        run: touch docs/.vitepress/dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages
          commit_message: "deploy: docs from ${{ github.sha }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      # Mirror the same built site to Tangled, which has no build step of its
      # own — it just serves a branch. The /ember/ base path matches the
      # Tangled sub-path site (nodnarb.tngl.sh/ember/), so the GitHub Pages
      # artifacts work unchanged. Skipped until TANGLED_DEPLOY_KEY is set.
      # peaceiris is GitHub-only, hence the plain force-push.
      - name: Mirror built site to Tangled
        if: ${{ env.TANGLED_DEPLOY_KEY != '' }}
        env:
          TANGLED_REMOTE: git@tangled.org:did:plc:uxktlja5en4yrm7rcyvhnm2t
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$TANGLED_DEPLOY_KEY" > ~/.ssh/tangled_deploy
          chmod 600 ~/.ssh/tangled_deploy
          ssh-keyscan -t ed25519 tangled.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tangled_deploy -o IdentitiesOnly=yes"
          cd docs/.vitepress/dist
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -qm "deploy: docs from ${{ github.sha }}"
          git push -f "$TANGLED_REMOTE" HEAD:gh-pages
