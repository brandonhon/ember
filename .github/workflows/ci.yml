name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (vet + test + vuln)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install
        working-directory: web
        run: npm ci

      - name: typecheck
        working-directory: web
        # svelte-check returns non-zero on errors. We tolerate the pre-existing
        # ArticleList HTMLElement warning by piping through grep that strips
        # only that single line; any other error still fails.
        run: |
          set -o pipefail
          npm run check 2>&1 | tee check.out
          ! grep -q "ERROR" check.out || (grep "ERROR" check.out | grep -v "Property 'align' is missing")

      - name: build
        working-directory: web
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install web
        working-directory: web
        run: npm ci

      - name: embed + build binary
        run: make embed build

      - name: install playwright
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: run e2e
        working-directory: web
        run: npx playwright test --reporter=line
