name: CI

# === CI IS PAUSED ON THIS REPO ===
#
# The remote CI workflow is intentionally a no-op. All validation runs locally
# before push:
#
#   GO111MODULE=on make embed build
#   GO111MODULE=on go vet ./...
#   GO111MODULE=on go test -race -count=1 ./...
#   (cd web && npm run check && npm run build)
#
# Branch protection on `main` still requires the four status checks below by
# name (Detect changes / Go / Web / E2E). They each exit 0 in seconds so PRs
# can merge without burning CI minutes; the real gate is the local chain.
#
# TO UN-PAUSE: revert this file to the commit before the "ci: pause on main"
# change. The dorny/paths-filter logic + real Go/Web/E2E jobs come back as a
# unit; nothing else needs touching.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - id: filter
        run: echo "app=false" >> "$GITHUB_OUTPUT"

  go:
    name: Go (vet + test + vuln)
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: 'true'

  web:
    name: Web (typecheck + build)
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: 'true'

  e2e:
    name: E2E (Playwright)
    needs: [changes, go, web]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: 'true'
