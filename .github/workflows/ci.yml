name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (vet + test + vuln)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: embed SPA
        # //go:embed all:dist requires real files in internal/web/dist.
        # Build the SPA + copy it before any Go command runs.
        run: |
          (cd web && npm ci && npm run build)
          rm -rf internal/web/dist
          mkdir -p internal/web/dist
          cp -R web/dist/. internal/web/dist/

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install
        working-directory: web
        run: npm ci

      - name: typecheck
        working-directory: web
        run: npm run check

      - name: build
        working-directory: web
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install web
        working-directory: web
        run: npm ci

      - name: embed + build binary
        run: make embed build

      - name: install playwright
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: run e2e
        working-directory: web
        run: npx playwright test --reporter=line
