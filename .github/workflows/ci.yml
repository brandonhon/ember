name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: go lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: go mod download
        run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
      - name: test
        run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -n 20
      - name: build
        run: make build

  web:
    name: web build + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        run: npm ci
        working-directory: web
      - name: build
        run: npm run build
        working-directory: web
      - name: test
        run: npm run test:run
        working-directory: web

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install web deps
        run: npm ci
        working-directory: web
      - name: build web (for embedding)
        run: npm run build
        working-directory: web
      - name: embed + build go binary
        run: make embed build
      - name: install playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: web
      - name: run e2e
        run: npx playwright test
        working-directory: web
      - name: upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            web/test-results/
            web/playwright-report/
          retention-days: 7

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ember:ci
          build-args: |
            VERSION=ci
