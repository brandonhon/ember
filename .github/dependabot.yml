version: 2
updates:
  # Go modules — weekly check, security patches always.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]

  # SPA npm packages.
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns: ["*"]

  # Docs site (VitePress).
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  # GitHub Actions versions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
