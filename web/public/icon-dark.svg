<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark-mode variant. Used when prefers-color-scheme: dark so the marks
       stay legible against dark browser chrome / tab strips. Mirrors
       web/public/icon.svg structurally; only the ink fills flip from
       near-black to paper-cream. -->
  <defs>
    <linearGradient id="emb-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8643a"/><stop offset="1" stop-color="#c2451d"/>
    </linearGradient>
  </defs>
  <circle cx="13" cy="15" r="6.5" fill="url(#emb-dark)"/>
  <rect x="25" y="11.5" width="31" height="8" rx="4" fill="#f0e9da"/>
  <rect x="8"  y="28"   width="48" height="8" rx="4" fill="#f0e9da"/>
  <rect x="8"  y="44.5" width="34" height="8" rx="4" fill="url(#emb-dark)"/>
</svg>
