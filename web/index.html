<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c2451d" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Favicon: light + dark SVGs with media-scoped <link> for initial
         paint (before JS hydrates and App.svelte's $effect takes over with
         the canvas-rendered new-article-dot overlay). PNG fallbacks for
         browsers that don't render SVG favicons (or where SVG isn't picked
         due to size matching). -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/icon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/03-feedmark-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/03-feedmark-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..700&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap"
      rel="stylesheet"
    />
    <title>Ember</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
