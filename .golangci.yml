version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - gosec
    - bodyclose
  settings:
    errcheck:
      # SQL row/db Close errors are not actionable — silencing across the
      # codebase rather than littering `_ = rows.Close()` everywhere.
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G104  # audited error returns by errcheck already
        - G115  # int→uint conversions are bounded by self-produced base64 lengths
        - G201  # SQL format string — only used to splice column-name lists, never user input
        - G202  # SQL string concatenation — same as above
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - gocritic

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
